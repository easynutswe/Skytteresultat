<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultatmallar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background: #f4f6f8;
        }

        .sidebar {
            width: 220px;
            min-width: 220px;
            background: #1a1f2e;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-settings {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-settings h3 {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .setting-group {
            margin-bottom: 8px;
        }

        .setting-label {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-bottom: 3px;
            padding: 0 4px;
        }

        .setting-input {
            width: 100%;
            padding: 5px 8px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-family: inherit;
        }

        .setting-input::placeholder { color: rgba(255,255,255,0.25); }
        .setting-input:focus { outline: none; border-color: rgba(59,130,246,0.5); }

        .setting-file-label {
            display: block;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.55);
            font-size: 11px;
            cursor: pointer;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.15s;
        }

        .setting-file-label:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }

        .setting-file-label input { display: none; }

        .setting-status {
            font-size: 10px;
            color: #34d399;
            padding: 2px 4px;
            margin-top: 2px;
        }

        .setting-btn-row {
            display: flex;
            gap: 4px;
        }

        .setting-btn-row .setting-file-label { flex: 1; }

        .setting-btn-clear {
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(239,68,68,0.15);
            color: rgba(239,68,68,0.7);
            font-size: 11px;
            cursor: pointer;
            border: 1px solid rgba(239,68,68,0.2);
            font-family: inherit;
            transition: all 0.15s;
        }

        .setting-btn-clear:hover {
            background: rgba(239,68,68,0.25);
            color: rgba(239,68,68,0.9);
        }

        .logo-preview-small {
            max-width: 100%;
            max-height: 40px;
            margin-top: 4px;
            border-radius: 3px;
            display: block;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px 6px;
        }

        .sidebar-nav h3 {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            padding: 0 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 6px;
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
        }

        .nav-item.active {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
        }

        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .nav-item[data-page="Springskytte"] .nav-dot { background: #34d399; }
        .nav-item[data-page="Magnumsprecision"] .nav-dot { background: #fbbf24; }
        .nav-item[data-page="Nationell"] .nav-dot { background: #818cf8; }
        .nav-item[data-page="Milsnabb"] .nav-dot { background: #f87171; }
        .nav-item[data-page="Precision"] .nav-dot { background: #60a5fa; }

        .main {
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        .main iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: #9ca3af;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-settings">
            <h3>Inställningar</h3>

            <div class="setting-group">
                <div class="setting-label">Mailadress för resultat</div>
                <input type="email" class="setting-input" id="emailSetting" placeholder="namn@example.com" onchange="saveSettings()">
            </div>

            <div class="setting-group">
                <div class="setting-label">Logotyp (PDF-header)</div>
                <div class="setting-btn-row">
                    <label class="setting-file-label">
                        Ladda
                        <input type="file" accept="image/png,image/jpeg,image/jpg" onchange="loadLogo(this)">
                    </label>
                    <button class="setting-btn-clear" onclick="clearLogo()">Rensa</button>
                </div>
                <div class="setting-status" id="logoStatus"></div>
                <div id="logoPreview"></div>
            </div>

            <div class="setting-group">
                <div class="setting-label">Medlemslista (CSV)</div>
                <div class="setting-btn-row">
                    <label class="setting-file-label">
                        Ladda
                        <input type="file" accept=".csv,.txt" onchange="loadMembers(this)">
                    </label>
                    <button class="setting-btn-clear" onclick="clearMembers()">Rensa</button>
                </div>
                <div class="setting-status" id="membersStatus"></div>
            </div>
        </div>

        <div class="sidebar-nav">
            <h3>Tävlingsformer</h3>
            <button class="nav-item" data-page="Springskytte" onclick="loadPage('Springskytte')">
                <span class="nav-dot"></span> Springskytte
            </button>
            <button class="nav-item" data-page="Magnumsprecision" onclick="loadPage('Magnumsprecision')">
                <span class="nav-dot"></span> Magnumprecision
            </button>
            <button class="nav-item" data-page="Nationell" onclick="loadPage('Nationell')">
                <span class="nav-dot"></span> Nationell Helmatch
            </button>
            <button class="nav-item" data-page="Milsnabb" onclick="loadPage('Milsnabb')">
                <span class="nav-dot"></span> Milsnabb
            </button>
            <button class="nav-item" data-page="Precision" onclick="loadPage('Precision')">
                <span class="nav-dot"></span> Precision
            </button>
        </div>
    </nav>

    <main class="main" id="mainContent">
        <div class="welcome">Välj en tävlingsform i menyn</div>
    </main>

    <script>
        function loadPage(name) {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<iframe src="' + name + '.html?v=' + Date.now() + '"></iframe>';
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === name);
            });
        }

        function saveSettings() {
            const email = document.getElementById('emailSetting').value;
            localStorage.setItem('resultEmail', email);
        }

        function loadLogo(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('customLogo', e.target.result);
                showLogoStatus();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function clearLogo() {
            localStorage.removeItem('customLogo');
            document.getElementById('logoStatus').textContent = '';
            document.getElementById('logoPreview').innerHTML = '';
        }

        function showLogoStatus() {
            const logo = localStorage.getItem('customLogo');
            if (logo) {
                document.getElementById('logoStatus').textContent = 'Logotyp laddad';
                document.getElementById('logoPreview').innerHTML = '<img class="logo-preview-small" src="' + logo + '">';
            }
        }

        function loadMembers(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const content = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
                const lines = content.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                localStorage.setItem('membersList', JSON.stringify(lines));
                document.getElementById('membersStatus').textContent = lines.length + ' medlemmar laddade';
            };
            reader.readAsText(input.files[0]);
        }

        function clearMembers() {
            localStorage.removeItem('membersList');
            document.getElementById('membersStatus').textContent = '';
        }

        // Restore on load
        (function() {
            const email = localStorage.getItem('resultEmail');
            if (email) document.getElementById('emailSetting').value = email;
            showLogoStatus();
            const members = localStorage.getItem('membersList');
            if (members) {
                try {
                    const list = JSON.parse(members);
                    document.getElementById('membersStatus').textContent = list.length + ' medlemmar laddade';
                } catch(e) {}
            }
        })();
    </script>

</body>
</html>
