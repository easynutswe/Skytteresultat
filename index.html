<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyResultat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background: #f4f6f8;
        }

        .sidebar {
            width: 200px;
            min-width: 200px;
            background: #1a1f2e;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-brand {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .brand-text {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px 6px;
        }

        .sidebar-nav h3 {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            padding: 0 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 6px;
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
        }

        .nav-item.active {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
        }

        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .nav-item[data-page="Information"] .nav-dot { background: #9ca3af; }
        .nav-item[data-page="Springskytte"] .nav-dot { background: #34d399; }
        .nav-item[data-page="Magnumsprecision"] .nav-dot { background: #fbbf24; }
        .nav-item[data-page="Nationell"] .nav-dot { background: #818cf8; }
        .nav-item[data-page="Milsnabb"] .nav-dot { background: #f87171; }
        .nav-item[data-page="Precision"] .nav-dot { background: #60a5fa; }

        .main {
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        .main iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Home/settings page — matches sub-page styling */
        .home-page {
            height: 100%;
            overflow-y: auto;
            background-color: #f4f6f8;
            padding: 20px;
        }

        .container {
            width: 1750px;
            margin: 0;
            background-color: white;
            padding: 24px 24px 200px 24px;
            min-height: 100vh;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0 0 20px 0;
            letter-spacing: -0.02em;
        }

        .instructions {
            background-color: #f8f9fb;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e8ecf0;
        }

        .instructions h3 {
            margin: 0 0 8px 0;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 600;
        }

        .instructions p {
            margin: 4px 0;
            line-height: 1.5;
            font-size: 13px;
            color: #4a5568;
        }

        .setup-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .setup-box {
            background-color: #f0f7ff;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #c7ddf5;
        }

        .setup-box h4 {
            margin: 0 0 6px 0;
            color: #1a5276;
            font-size: 13px;
            font-weight: 600;
        }

        .setup-box p {
            margin: 0 0 6px 0;
            font-size: 12px;
            color: #5a6778;
        }

        .setup-box input[type="email"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .setup-box input[type="email"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
        }

        .btn-row {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            flex: 1;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #c7ddf5;
            background: white;
            color: #1a5276;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .btn-action:hover { background: #f0f7ff; border-color: #3b82f6; }

        .btn-action-clear {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #dc2626;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-action-clear:hover { background: #fee2e2; }

        .setting-status {
            font-size: 12px;
            color: #16a34a;
            margin-top: 4px;
        }

        .logo-preview-img {
            max-width: 200px;
            max-height: 80px;
            margin-top: 8px;
            border: 1px solid #e0e0e0;
            padding: 4px;
            background: white;
            border-radius: 4px;
        }

        .section-box {
            background-color: #f0f7ff;
            padding: 16px 20px;
            border-radius: 8px;
            border: 1px solid #c7ddf5;
            margin-bottom: 16px;
        }

        .section-box h4 {
            margin: 0 0 8px 0;
            color: #1a5276;
            font-size: 14px;
            font-weight: 600;
        }

        .section-box p {
            margin: 4px 0;
            font-size: 13px;
            color: #5a6778;
            line-height: 1.5;
        }

        .section-box pre {
            background: white;
            border: 1px solid #c7ddf5;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 12px;
            color: #374151;
            margin: 6px 0;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .section-box a {
            color: #3b82f6;
        }

        .section-action {
            margin-top: 10px;
        }

        .section-action input[type="email"] {
            width: 300px;
            padding: 6px 8px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .section-action input[type="email"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
        }

        @media (max-width: 900px) { .setup-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-text">EasyResultat</span>
        </div>

        <div class="sidebar-nav">
            <h3>Meny</h3>
            <button class="nav-item active" data-page="Information" onclick="showHome()">
                <span class="nav-dot"></span> Information
            </button>
            <button class="nav-item" data-page="Springskytte" onclick="loadPage('Springskytte')">
                <span class="nav-dot"></span> Springskytte
            </button>
            <button class="nav-item" data-page="Magnumsprecision" onclick="loadPage('Magnumsprecision')">
                <span class="nav-dot"></span> Magnumprecision
            </button>
            <button class="nav-item" data-page="Nationell" onclick="loadPage('Nationell')">
                <span class="nav-dot"></span> Nationell Helmatch
            </button>
            <button class="nav-item" data-page="Milsnabb" onclick="loadPage('Milsnabb')">
                <span class="nav-dot"></span> Milsnabb
            </button>
            <button class="nav-item" data-page="Precision" onclick="loadPage('Precision')">
                <span class="nav-dot"></span> Precision
            </button>
        </div>
    </nav>

    <main class="main" id="mainContent"></main>

    <script>
        const homeHTML = `
        <div class="home-page">
            <div class="container">
                <h1 class="page-title">Information</h1>

                <div class="instructions">
                    <h3>Om verktyget</h3>
                    <p>Webbverktyg för att registrera och rapportera skytteresultat. Välj tävlingsform i menyn, fyll i resultat, och exportera som PDF eller CSV.</p>
                    <p>Alla inställningar nedan sparas automatiskt i din webbläsare och delas mellan alla tävlingsformer.</p>
                    <p style="margin-top: 8px;"><strong>Så här gör du:</strong> Konfigurera mailadress, logotyp och medlemslista nedan. Välj sedan tävlingsform i menyn till vänster. Fyll i skyttarnas namn och resultat. Använd "Skapa PDF" för rapport eller "Skicka resultat" för att exportera och maila.</p>
                    <p style="margin-top: 8px; font-size: 12px; color: #6b7280;">Öppen källkod under MIT-licens — <a href="https://github.com/easynutswe/Skytteresultat" target="_blank" style="color: #3b82f6;">github.com/easynutswe/Skytteresultat</a></p>
                </div>

                <div class="section-box">
                    <h4>Mailadress</h4>
                    <p>Ange den mailadress som resultat ska skickas till. När du trycker "Skicka resultat" i en tävlingsform laddas CSV- och PDF-filer ner, och ett mail öppnas automatiskt till denna adress.</p>
                    <p>Lämna tomt om du inte vill att mail ska öppnas automatiskt.</p>
                    <div class="section-action">
                        <input type="email" id="emailSetting" placeholder="namn@example.com" onchange="saveEmail()">
                    </div>
                </div>

                <div class="section-box">
                    <h4>Logotyp</h4>
                    <p>Ladda upp en logotyp som visas överst i genererade PDF-rapporter. Stöder PNG och JPEG.</p>
                    <p>Rekommenderad storlek: ca 300–600 px bred. Bilden skalas automatiskt i PDF:en. Om ingen logotyp laddas genereras PDF utan header-bild.</p>
                    <div class="section-action">
                        <div class="btn-row">
                            <label class="btn-action">
                                Ladda bild
                                <input type="file" accept="image/png,image/jpeg,image/jpg" onchange="loadLogo(this)" style="display:none">
                            </label>
                            <button class="btn-action-clear" onclick="clearLogo()">Rensa</button>
                        </div>
                        <div class="setting-status" id="logoStatus"></div>
                        <div id="logoPreview"></div>
                    </div>
                </div>

                <div class="section-box">
                    <h4>Medlemslista</h4>
                    <p>Ladda en CSV- eller textfil med medlemsnamn för automatiska namnförslag när du fyller i resultat. Börja skriva ett namn så visas matchande förslag.</p>
                    <p><strong>Format:</strong> En fil med ett namn per rad, t.ex.:</p>
                    <pre>Anna Andersson\nBjörn Björkman\nCecilia Carlsson</pre>
                    <p>Filen kan vara .csv eller .txt, med eller utan BOM. Tomma rader ignoreras.</p>
                    <div class="section-action">
                        <div class="btn-row">
                            <label class="btn-action">
                                Ladda CSV
                                <input type="file" accept=".csv,.txt" onchange="loadMembers(this)" style="display:none">
                            </label>
                            <button class="btn-action-clear" onclick="clearMembers()">Rensa</button>
                        </div>
                        <div class="setting-status" id="membersStatus"></div>
                    </div>
                </div>
            </div>
        </div>`;

        function showHome() {
            document.getElementById('mainContent').innerHTML = homeHTML;
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === 'Information');
            });
            restoreHomeState();
        }

        function loadPage(name) {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<iframe src="' + name + '.html?v=' + Date.now() + '"></iframe>';
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === name);
            });
        }

        function saveEmail() {
            const el = document.getElementById('emailSetting');
            if (el) localStorage.setItem('resultEmail', el.value);
        }

        function loadLogo(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('customLogo', e.target.result);
                updateLogoDisplay();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function clearLogo() {
            localStorage.removeItem('customLogo');
            updateLogoDisplay();
        }

        function updateLogoDisplay() {
            const logo = localStorage.getItem('customLogo');
            const status = document.getElementById('logoStatus');
            const preview = document.getElementById('logoPreview');
            if (!status || !preview) return;
            if (logo) {
                status.textContent = 'Logotyp laddad';
                preview.innerHTML = '<img class="logo-preview-img" src="' + logo + '">';
            } else {
                status.textContent = '';
                preview.innerHTML = '';
            }
        }

        function loadMembers(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const content = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
                const lines = content.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
                localStorage.setItem('membersList', JSON.stringify(lines));
                const el = document.getElementById('membersStatus');
                if (el) el.textContent = lines.length + ' medlemmar laddade';
            };
            reader.readAsText(input.files[0]);
        }

        function clearMembers() {
            localStorage.removeItem('membersList');
            const el = document.getElementById('membersStatus');
            if (el) el.textContent = '';
        }

        function restoreHomeState() {
            const email = localStorage.getItem('resultEmail');
            const emailEl = document.getElementById('emailSetting');
            if (email && emailEl) emailEl.value = email;

            updateLogoDisplay();

            const members = localStorage.getItem('membersList');
            const membersEl = document.getElementById('membersStatus');
            if (members && membersEl) {
                try {
                    const list = JSON.parse(members);
                    membersEl.textContent = list.length + ' medlemmar laddade';
                } catch(e) {}
            }
        }

        // Init
        showHome();
    </script>

</body>
</html>
