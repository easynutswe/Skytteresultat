<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyResultat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background: #f4f6f8;
        }

        .sidebar {
            width: 200px;
            min-width: 200px;
            background: #1a1f2e;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-brand {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .brand-text {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px 6px;
        }

        .sidebar-nav h3 {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            padding: 0 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 6px;
            color: rgba(255,255,255,0.55);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
        }

        .nav-item.active {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
        }

        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .nav-item[data-page="Information"] .nav-dot { background: #9ca3af; }
        .nav-item[data-page="Springskytte"] .nav-dot { background: #34d399; }
        .nav-item[data-page="Magnumsprecision"] .nav-dot { background: #fbbf24; }
        .nav-item[data-page="Nationell"] .nav-dot { background: #818cf8; }
        .nav-item[data-page="Milsnabb"] .nav-dot { background: #f87171; }
        .nav-item[data-page="Precision"] .nav-dot { background: #60a5fa; }
        .nav-item[data-page="Faltskytte"] .nav-dot { background: #f59e0b; }

        .main {
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        .main iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Home/settings page — matches sub-page styling */
        .home-page {
            height: 100%;
            overflow-y: auto;
            background-color: #f4f6f8;
            padding: 20px;
        }

        .container {
            width: 1750px;
            margin: 0;
            background-color: white;
            padding: 24px 24px 200px 24px;
            min-height: 100vh;
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0 0 20px 0;
            letter-spacing: -0.02em;
        }

        .instructions {
            background-color: #f8f9fb;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e8ecf0;
        }

        .instructions h3 {
            margin: 0 0 8px 0;
            color: #1a1a2e;
            font-size: 14px;
            font-weight: 600;
        }

        .instructions p {
            margin: 4px 0;
            line-height: 1.5;
            font-size: 13px;
            color: #4a5568;
        }

        .setup-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .setup-box {
            background-color: #f0f7ff;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #c7ddf5;
        }

        .setup-box h4 {
            margin: 0 0 6px 0;
            color: #1a5276;
            font-size: 13px;
            font-weight: 600;
        }

        .setup-box p {
            margin: 0 0 6px 0;
            font-size: 12px;
            color: #5a6778;
        }

        .setup-box input[type="email"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .setup-box input[type="email"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
        }

        .btn-row {
            display: flex;
            gap: 6px;
        }

        .btn-action {
            flex: 1;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #c7ddf5;
            background: white;
            color: #1a5276;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .btn-action:hover { background: #f0f7ff; border-color: #3b82f6; }

.setting-status {
            font-size: 12px;
            color: #16a34a;
            margin-top: 4px;
        }

        .logo-preview-img {
            max-width: 200px;
            max-height: 80px;
            margin-top: 8px;
            border: 1px solid #e0e0e0;
            padding: 4px;
            background: white;
            border-radius: 4px;
        }

        .section-box {
            background-color: #f0f7ff;
            padding: 16px 20px;
            border-radius: 8px;
            border: 1px solid #c7ddf5;
            margin-bottom: 16px;
        }

        .section-box h4 {
            margin: 0 0 8px 0;
            color: #1a5276;
            font-size: 14px;
            font-weight: 600;
        }

        .section-box p {
            margin: 4px 0;
            font-size: 13px;
            color: #5a6778;
            line-height: 1.5;
        }

        .section-box pre {
            background: white;
            border: 1px solid #c7ddf5;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 12px;
            color: #374151;
            margin: 6px 0;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .section-box a {
            color: #3b82f6;
        }

        .section-action {
            margin-top: 10px;
        }

        .input-row {
            display: flex;
            gap: 6px;
            align-items: center;
            width: 300px;
        }

        .input-row input[type="email"] {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        .input-row input[type="email"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
        }

        .input-row .btn-action {
            flex: 1;
        }

        .btn-action-clear-sm {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            background: white;
            color: #9ca3af;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn-action-clear-sm:hover {
            border-color: #fecaca;
            background: #fef2f2;
            color: #dc2626;
        }

        @media (max-width: 900px) { .setup-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-text">EasyResultat</span>
        </div>

        <div class="sidebar-nav">
            <h3>Meny</h3>
            <button class="nav-item active" data-page="Information" onclick="showHome()">
                <span class="nav-dot"></span> Information
            </button>
            <button class="nav-item" data-page="Springskytte" onclick="loadPage('Springskytte')">
                <span class="nav-dot"></span> Springskytte
            </button>
            <button class="nav-item" data-page="Magnumsprecision" onclick="loadPage('Magnumsprecision')">
                <span class="nav-dot"></span> Magnumprecision
            </button>
            <button class="nav-item" data-page="Nationell" onclick="loadPage('Nationell')">
                <span class="nav-dot"></span> Nationell Helmatch
            </button>
            <button class="nav-item" data-page="Milsnabb" onclick="loadPage('Milsnabb')">
                <span class="nav-dot"></span> Milsnabb
            </button>
            <button class="nav-item" data-page="Precision" onclick="loadPage('Precision')">
                <span class="nav-dot"></span> Precision
            </button>
            <button class="nav-item" data-page="Faltskytte" onclick="loadPage('Faltskytte')">
                <span class="nav-dot"></span> Fältskytte
            </button>
        </div>
    </nav>

    <main class="main" id="mainContent"></main>

    <div id="unlockOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); z-index:9999; display:none; align-items:center; justify-content:center;">
        <div style="background:white; padding:28px 32px; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,0.2); max-width:360px; width:90%; text-align:center;">
            <h3 style="margin:0 0 8px; font-size:16px; color:#1a1a2e;">Lösenordsskydd aktivt</h3>
            <p style="font-size:13px; color:#6b7280; margin:0 0 16px;">Ange lösenord för att låsa upp dina inställningar.</p>
            <input type="password" id="unlockPassword" placeholder="Lösenord" style="width:100%; padding:8px 12px; border:1px solid #d0d5dd; border-radius:6px; font-size:14px; font-family:inherit; margin-bottom:8px;">
            <p id="unlockError" style="font-size:12px; color:#dc2626; margin:0 0 8px; display:none;">Fel lösenord. Försök igen.</p>
            <button onclick="unlockData()" style="width:100%; padding:9px; border:none; border-radius:6px; background:#3b82f6; color:white; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;">Lås upp</button>
            <p style="margin-top:16px; font-size:12px; color:#9ca3af;">Glömt lösenordet?</p>
            <button onclick="resetEncryptedData()" style="margin-top:4px; padding:6px 14px; border:1px solid #fecaca; border-radius:6px; background:#fef2f2; color:#dc2626; font-size:12px; cursor:pointer; font-family:inherit;">Rensa all data och börja om</button>
        </div>
    </div>

    <script>
        const APP_VERSION = '4';

        const homeHTML = `
        <div class="home-page">
            <div class="container">
                <h1 class="page-title">Information</h1>

                <div class="instructions">
                    <h3>Om verktyget</h3>
                    <p>Webbverktyg för att registrera och rapportera skytteresultat. Alla inställningar nedan sparas automatiskt i din webbläsare och delas mellan alla tävlingsformer.</p>

                    <p style="margin-top: 10px;"><strong>Så här gör du:</strong></p>
                    <p>1. Konfigurera mailadress, logotyp och medlemslista nedan</p>
                    <p>2. Välj tävlingsform i menyn till vänster</p>
                    <p>3. Fyll i tävlingsnamn, datum och tävlingsledare/skjutledare</p>
                    <p>4. Lägg till rader och fyll i skyttarnas namn och resultat</p>
                    <p>5. Tryck <strong>"Beräkna &amp; Sortera"</strong> för att summera och sortera</p>
                    <p>6. Använd <strong>"Skapa PDF"</strong> för utskriftsbar rapport</p>
                    <p>7. Använd <strong>"Skicka resultat"</strong> för att ladda ner CSV + PDF och förbereda mail</p>
                    <p style="margin-top: 6px;"><strong>Tips:</strong> Spara en kopia med "Spara CSV" så kan du ladda upp den senare med "Ladda CSV" för att redigera och skicka in på nytt.</p>
                    <p style="margin-top: 8px; font-size: 12px; color: #6b7280;">Öppen källkod under MIT-licens — <a href="https://github.com/easynutswe/Skytteresultat" target="_blank" style="color: #3b82f6;">github.com/easynutswe/Skytteresultat</a></p>
                </div>

                <div class="section-box">
                    <h4>Datalagring</h4>
                    <p>All data (mailadress, logotyp, medlemslista och resultat) sparas lokalt i din webbläsare via <strong>localStorage</strong>. Inget skickas till någon server. Datan finns bara på just denna dator och i just denna webbläsare.</p>
                    <p>Datan är isolerad till denna webbplats — andra sajter kan inte läsa den. Däremot kan någon med fysisk tillgång till datorn teoretiskt läsa webbläsarens lagrade data.</p>
                    <p style="margin-top: 8px;"><strong>Utökat skydd (valfritt):</strong> Aktivera kryptering nedan för att skydda datan med ett lösenord. Datan krypteras med AES-256 och kan bara läsas med rätt lösenord. Du behöver ange lösenordet varje gång du öppnar sidan.</p>
                    <div class="section-action">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #1a5276; cursor: pointer;">
                            <input type="checkbox" id="encryptionToggle" onchange="toggleEncryption()">
                            Aktivera lösenordsskydd
                        </label>
                        <div id="encryptionFields" style="display: none; margin-top: 8px;">
                            <div class="input-row">
                                <input type="password" id="encryptionPassword" placeholder="Ange lösenord" style="flex:1; padding:6px 8px; border:1px solid #d0d5dd; border-radius:6px; font-size:13px; font-family:inherit;">
                                <button class="btn-action" onclick="applyEncryption()" style="flex:none; padding:6px 14px;">Spara</button>
                            </div>
                            <p style="margin-top: 4px; font-size: 11px; color: #dc2626;">OBS: Glömt lösenord = förlorad data. Det går inte att återställa.</p>
                        </div>
                        <div class="setting-status" id="encryptionStatus"></div>
                    </div>
                </div>

                <div class="section-box">
                    <h4>Mailadress</h4>
                    <p>Ange den mailadress som resultat ska skickas till. När du trycker "Skicka resultat" i en tävlingsform laddas CSV- och PDF-filer ner, och ett mail öppnas automatiskt till denna adress.</p>
                    <p>Lämna tomt om du inte vill att mail ska öppnas automatiskt.</p>
                    <div class="section-action">
                        <div class="input-row">
                            <input type="email" id="emailSetting" placeholder="namn@example.com" onchange="saveEmail()">
                            <button class="btn-action-clear-sm" onclick="clearEmail()">Rensa</button>
                        </div>
                    </div>
                </div>

                <div class="section-box">
                    <h4>Logotyp</h4>
                    <p>Ladda upp en logotyp som visas överst i genererade PDF-rapporter. Stöder PNG och JPEG.</p>
                    <p>Rekommenderad storlek: ca 300–600 px bred. Bilden skalas automatiskt i PDF:en. Om ingen logotyp laddas genereras PDF utan header-bild.</p>
                    <div class="section-action">
                        <div class="input-row">
                            <label class="btn-action">
                                Ladda bild
                                <input type="file" accept="image/png,image/jpeg,image/jpg" onchange="loadLogo(this)" style="display:none">
                            </label>
                            <button class="btn-action-clear-sm" onclick="clearLogo()">Rensa</button>
                        </div>
                        <div class="setting-status" id="logoStatus"></div>
                        <div id="logoPreview"></div>
                    </div>
                </div>

                <div class="section-box">
                    <h4>Medlemslista</h4>
                    <p>Ladda en CSV- eller textfil med medlemsnamn för automatiska namnförslag när du fyller i resultat. Börja skriva ett namn så visas matchande förslag.</p>
                    <p><strong>Format:</strong> En fil med ett namn per rad, t.ex.:</p>
                    <pre>Anna Andersson\nBjörn Björkman\nCecilia Carlsson</pre>
                    <p>Filen kan vara .csv eller .txt, med eller utan BOM. Tomma rader ignoreras.</p>
                    <div class="section-action">
                        <div class="input-row">
                            <label class="btn-action">
                                Ladda CSV
                                <input type="file" accept=".csv,.txt" onchange="loadMembers(this)" style="display:none">
                            </label>
                            <button class="btn-action-clear-sm" onclick="clearMembers()">Rensa</button>
                        </div>
                        <div class="setting-status" id="membersStatus"></div>
                    </div>
                </div>
            </div>
        </div>`;

        function showHome() {
            document.getElementById('mainContent').innerHTML = homeHTML;
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === 'Information');
            });
            restoreHomeState();
        }

        function loadPage(name) {
            const main = document.getElementById('mainContent');
            main.innerHTML = '<iframe src="' + name + '.html?v=' + APP_VERSION + '"></iframe>';
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === name);
            });
        }

        function saveEmail() {
            const el = document.getElementById('emailSetting');
            if (el) localStorage.setItem('resultEmail', el.value);
        }

        function clearEmail() {
            localStorage.removeItem('resultEmail');
            const el = document.getElementById('emailSetting');
            if (el) el.value = '';
        }

        function loadLogo(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('customLogo', e.target.result);
                updateLogoDisplay();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function clearLogo() {
            localStorage.removeItem('customLogo');
            updateLogoDisplay();
        }

        function updateLogoDisplay() {
            const logo = localStorage.getItem('customLogo');
            const status = document.getElementById('logoStatus');
            const preview = document.getElementById('logoPreview');
            if (!status || !preview) return;
            if (logo) {
                status.textContent = 'Logotyp laddad';
                preview.innerHTML = '<img class="logo-preview-img" src="' + logo + '">';
            } else {
                status.textContent = '';
                preview.innerHTML = '';
            }
        }

        function loadMembers(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const content = text.charCodeAt(0) === 0xFEFF ? text.slice(1) : text;
                const lines = content.split(/\r?\n/)
                    .map(l => l.replace(/[;,\t]+/g, ' ').replace(/\s+/g, ' ').trim())
                    .filter(l => l.length > 0);
                localStorage.setItem('membersList', JSON.stringify(lines));
                const el = document.getElementById('membersStatus');
                if (el) el.textContent = lines.length + ' medlemmar laddade';
            };
            reader.readAsText(input.files[0]);
        }

        function clearMembers() {
            localStorage.removeItem('membersList');
            const el = document.getElementById('membersStatus');
            if (el) el.textContent = '';
        }

        function restoreHomeState() {
            const email = localStorage.getItem('resultEmail');
            const emailEl = document.getElementById('emailSetting');
            if (email && emailEl) emailEl.value = email;

            updateLogoDisplay();

            const members = localStorage.getItem('membersList');
            const membersEl = document.getElementById('membersStatus');
            if (members && membersEl) {
                try {
                    const list = JSON.parse(members);
                    membersEl.textContent = list.length + ' medlemmar laddade';
                } catch(e) {}
            }

            // Restore encryption checkbox state
            const toggle = document.getElementById('encryptionToggle');
            const fields = document.getElementById('encryptionFields');
            const status = document.getElementById('encryptionStatus');
            if (toggle && localStorage.getItem('encryptedSettings')) {
                toggle.checked = true;
                if (fields) fields.style.display = 'block';
                if (status) status.textContent = 'Kryptering aktiv';
            }
        }

        // --- Encryption helpers (AES-256-GCM via Web Crypto API) ---
        const SETTINGS_KEYS = ['resultEmail', 'customLogo', 'membersList'];

        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        async function encryptData(password) {
            const data = {};
            SETTINGS_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v) data[k] = v; });
            const plaintext = new TextEncoder().encode(JSON.stringify(data));
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt);
            const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, plaintext);
            // Store as base64: salt + iv + ciphertext
            const combined = new Uint8Array(salt.length + iv.length + new Uint8Array(ciphertext).length);
            combined.set(salt, 0);
            combined.set(iv, salt.length);
            combined.set(new Uint8Array(ciphertext), salt.length + iv.length);
            let binary = '';
            for (let i = 0; i < combined.length; i++) binary += String.fromCharCode(combined[i]);
            return btoa(binary);
        }

        async function decryptData(password, encoded) {
            const decoded = atob(encoded);
            const raw = new Uint8Array(decoded.length);
            for (let i = 0; i < decoded.length; i++) raw[i] = decoded.charCodeAt(i);
            const salt = raw.slice(0, 16);
            const iv = raw.slice(16, 28);
            const ciphertext = raw.slice(28);
            const key = await deriveKey(password, salt);
            const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
            return JSON.parse(new TextDecoder().decode(plaintext));
        }

        function toggleEncryption() {
            const toggle = document.getElementById('encryptionToggle');
            const fields = document.getElementById('encryptionFields');
            const status = document.getElementById('encryptionStatus');
            if (toggle.checked) {
                fields.style.display = 'block';
                status.textContent = '';
            } else {
                fields.style.display = 'none';
                // Disable encryption: remove encrypted blob, keep plaintext
                localStorage.removeItem('encryptedSettings');
                status.textContent = 'Kryptering avaktiverad';
                setTimeout(() => { if (status) status.textContent = ''; }, 3000);
            }
        }

        async function applyEncryption() {
            const pw = document.getElementById('encryptionPassword').value;
            if (!pw || pw.length < 4) { alert('Lösenordet måste vara minst 4 tecken.'); return; }
            try {
                const encrypted = await encryptData(pw);
                localStorage.setItem('encryptedSettings', encrypted);
                // Remove plaintext
                SETTINGS_KEYS.forEach(k => localStorage.removeItem(k));
                document.getElementById('encryptionPassword').value = '';
                document.getElementById('encryptionStatus').textContent = 'Kryptering aktiv — datan är nu skyddad';
                // Immediately unlock for this session
                sessionUnlocked = true;
                // Re-decrypt to localStorage for this session
                const data = await decryptData(pw, encrypted);
                Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
                restoreHomeState();
            } catch(e) {
                alert('Fel vid kryptering: ' + e.message);
            }
        }

        let sessionUnlocked = false;

        async function unlockData() {
            const pw = document.getElementById('unlockPassword').value;
            const errorEl = document.getElementById('unlockError');
            try {
                const encrypted = localStorage.getItem('encryptedSettings');
                const data = await decryptData(pw, encrypted);
                Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
                sessionUnlocked = true;
                document.getElementById('unlockOverlay').style.display = 'none';
                showHome();
            } catch(e) {
                errorEl.style.display = 'block';
            }
        }

        function resetEncryptedData() {
            if (!confirm('Detta raderar ALL sparad data (mailadress, logotyp, medlemslista) permanent. Vill du fortsätta?')) return;
            localStorage.removeItem('encryptedSettings');
            SETTINGS_KEYS.forEach(k => localStorage.removeItem(k));
            document.getElementById('unlockOverlay').style.display = 'none';
            showHome();
        }

        // On page close: re-encrypt and remove plaintext if encryption is active
        window.addEventListener('beforeunload', async function() {
            if (!sessionUnlocked) return;
            const encrypted = localStorage.getItem('encryptedSettings');
            if (!encrypted) return;
            // Remove plaintext keys (encrypted blob is already saved)
            SETTINGS_KEYS.forEach(k => localStorage.removeItem(k));
        });

        // --- Init ---
        (function() {
            const encrypted = localStorage.getItem('encryptedSettings');
            const hasPlaintext = SETTINGS_KEYS.some(k => localStorage.getItem(k));
            if (encrypted && !hasPlaintext) {
                // Need to unlock
                document.getElementById('unlockOverlay').style.display = 'flex';
                setTimeout(() => document.getElementById('unlockPassword').focus(), 100);
            }
            showHome();

            // Allow Enter key in unlock dialog
            document.getElementById('unlockPassword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') unlockData();
            });
        })();
    </script>

</body>
</html>
